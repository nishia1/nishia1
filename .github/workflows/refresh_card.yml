name: Refresh GitHub Card

on:
  schedule:
    # run at 11:59 PM to make commits for day accurately
    - cron: "59 23 * * *"
  workflow_dispatch: # allow manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1 checkout your profile repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2 install wkhtmltopdf (provides wkhtmltoimage)
      - name: Install wkhtmltopdf
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wkhtmltopdf

      # 3 set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # 4 install Python deps
      - name: Install Python dependencies
        run: pip install requests

      # 5 generate both dark and light cards
      - name: Generate card
        env:
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: |
          python generate_card.py --theme dark
          python generate_card.py --theme light

      # 6 commit & push if the images changed
      - name: Commit updated card
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_card_dark.jpg github_card_light.jpg
          git diff --cached --quiet || git commit -m "chore: refresh github card [skip ci]"
          git push
